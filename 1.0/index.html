<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无限白板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f0f0;
  touch-action: none;
}

canvas {
  display: block;
  cursor: crosshair;
}

/* 工具栏 */
.toolbar {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  padding: 8px 16px;
  border-radius: 12px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.12);
  z-index: 100;
  user-select: none;
}

.toolbar button {
  width: 40px;
  height: 40px;
  border: 2px solid transparent;
  border-radius: 8px;
  background: #f5f5f5;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: all 0.15s;
  position: relative;
}

.toolbar button:hover {
  background: #e8e8e8;
}

.toolbar button.active {
  border-color: #4a90d9;
  background: #e8f0fe;
}

.toolbar .sep {
  width: 1px;
  height: 28px;
  background: #ddd;
  margin: 0 4px;
}

/* 颜色选择 */
.color-btn {
  width: 32px !important;
  height: 32px !important;
  border-radius: 50% !important;
  padding: 0 !important;
  font-size: 0 !important;
  border: 2px solid #fff !important;
  box-shadow: 0 0 0 1px #ccc;
}

.color-btn.active {
  box-shadow: 0 0 0 2px #4a90d9 !important;
}

.color-picker-wrap {
  position: relative;
}

.color-picker-wrap input[type="color"] {
  position: absolute;
  width: 0;
  height: 0;
  opacity: 0;
}

/* 线宽滑块 */
.size-slider {
  width: 80px;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: #ddd;
  border-radius: 3px;
  outline: none;
}

.size-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #4a90d9;
  cursor: pointer;
}

.size-label {
  font-size: 12px;
  color: #666;
  min-width: 24px;
  text-align: center;
}

/* 坐标显示 */
.coords {
  position: fixed;
  bottom: 12px;
  right: 16px;
  font-size: 12px;
  color: #999;
  z-index: 100;
  user-select: none;
}

/* 缩放控制 */
.zoom-controls {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  padding: 6px 12px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  z-index: 100;
  user-select: none;
}

.zoom-controls button {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 6px;
  background: #f5f5f5;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.zoom-controls button:hover { background: #e8e8e8; }

.zoom-controls .zoom-label {
  font-size: 13px;
  color: #666;
  min-width: 48px;
  text-align: center;
  cursor: pointer;
}

/* 提示 */
.hint {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: #aaa;
  z-index: 100;
  user-select: none;
  pointer-events: none;
  transition: opacity 0.5s;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- 工具栏 -->
<div class="toolbar">
  <!-- 绘图工具 -->
  <button id="penBtn" class="active" title="画笔 (B)">✏️</button>
  <button id="eraserBtn" title="橡皮 (E)">🧹</button>
  <button id="panBtn" title="漫游/拖拽 (H)">✋</button>
  <div class="sep"></div>

  <!-- 颜色 -->
  <button class="color-btn active" style="background:#222" data-color="#222"></button>
  <button class="color-btn" style="background:#e74c3c" data-color="#e74c3c"></button>
  <button class="color-btn" style="background:#3498db" data-color="#3498db"></button>
  <button class="color-btn" style="background:#2ecc71" data-color="#2ecc71"></button>
  <button class="color-btn" style="background:#f39c12" data-color="#f39c12"></button>
  <button class="color-btn" style="background:#9b59b6" data-color="#9b59b6"></button>
  <div class="color-picker-wrap">
    <button id="customColorBtn" class="color-btn" style="background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red);font-size:14px" title="自定义颜色">🎨</button>
    <input type="color" id="colorPicker" value="#222222">
  </div>
  <div class="sep"></div>

  <!-- 线宽 -->
  <span class="size-label" id="sizeLabel">3</span>
  <input type="range" class="size-slider" id="sizeSlider" min="1" max="50" value="3">
  <div class="sep"></div>

  <!-- 操作 -->
  <button id="undoBtn" title="撤销 (Ctrl+Z)">↩️</button>
  <button id="clearBtn" title="清空画布">🗑️</button>
</div>

<!-- 缩放控制 -->
<div class="zoom-controls">
  <button id="zoomOut" title="缩小">−</button>
  <span class="zoom-label" id="zoomLabel" title="点击重置缩放">100%</span>
  <button id="zoomIn" title="放大">+</button>
</div>

<div class="coords" id="coords">0, 0</div>
<div class="hint" id="hint">滚轮缩放 · 空格+拖拽漫游 · 双指缩放</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ============ 状态 ============
let tool = 'pen';       // pen | eraser | pan
let color = '#222';
let lineWidth = 3;
let scale = 1;
let offsetX = 0, offsetY = 0;

// 绘图历史（用于撤销）
let history = [];
let currentStroke = null;

// 交互状态
let isDrawing = false;
let isPanning = false;
let lastX, lastY;
let spaceHeld = false;

// 触摸状态
let touches = {};
let lastPinchDist = 0;
let lastPinchCenter = null;

// ============ Canvas 初始化 ============
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  redraw();
}
window.addEventListener('resize', resize);

// ============ 坐标转换 ============
function screenToWorld(sx, sy) {
  return {
    x: (sx - offsetX) / scale,
    y: (sy - offsetY) / scale
  };
}

function worldToScreen(wx, wy) {
  return {
    x: wx * scale + offsetX,
    y: wy * scale + offsetY
  };
}

// ============ 绘制 ============
function redraw() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 背景网格
  drawGrid();

  // 应用变换
  ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);

  // 绘制所有笔画
  for (const stroke of history) {
    drawStroke(stroke);
  }
  if (currentStroke) drawStroke(currentStroke);
}

function drawGrid() {
  const gridSize = 40;
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 0.5;

  const startX = offsetX % (gridSize * scale);
  const startY = offsetY % (gridSize * scale);
  const step = gridSize * scale;

  ctx.beginPath();
  for (let x = startX; x < canvas.width; x += step) {
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
  }
  for (let y = startY; y < canvas.height; y += step) {
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
  }
  ctx.stroke();

  // 原点十字
  const origin = worldToScreen(0, 0);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, canvas.height);
  ctx.moveTo(0, origin.y); ctx.lineTo(canvas.width, origin.y);
  ctx.stroke();
}

function drawStroke(stroke) {
  if (stroke.points.length < 2) return;

  ctx.beginPath();
  ctx.strokeStyle = stroke.tool === 'eraser' ? '#f0f0f0' : stroke.color;
  ctx.lineWidth = stroke.lineWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.globalCompositeOperation = stroke.tool === 'eraser' ? 'destination-out' : 'source-over';

  const pts = stroke.points;
  ctx.moveTo(pts[0].x, pts[0].y);

  if (pts.length === 2) {
    ctx.lineTo(pts[1].x, pts[1].y);
  } else {
    for (let i = 1; i < pts.length - 1; i++) {
      const mx = (pts[i].x + pts[i + 1].x) / 2;
      const my = (pts[i].y + pts[i + 1].y) / 2;
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
    }
    const last = pts[pts.length - 1];
    ctx.lineTo(last.x, last.y);
  }
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
}

// ============ 鼠标事件 ============
canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && (tool === 'pan' || spaceHeld))) {
    isPanning = true;
    lastX = e.clientX;
    lastY = e.clientY;
    canvas.style.cursor = 'grabbing';
    return;
  }

  if (e.button === 0 && (tool === 'pen' || tool === 'eraser')) {
    isDrawing = true;
    const w = screenToWorld(e.clientX, e.clientY);
    currentStroke = {
      tool,
      color,
      lineWidth: tool === 'eraser' ? lineWidth * 3 : lineWidth,
      points: [{ x: w.x, y: w.y }]
    };
  }
});

canvas.addEventListener('mousemove', e => {
  // 更新坐标
  const w = screenToWorld(e.clientX, e.clientY);
  document.getElementById('coords').textContent =
    `${Math.round(w.x)}, ${Math.round(w.y)}`;

  if (isPanning) {
    offsetX += e.clientX - lastX;
    offsetY += e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    redraw();
    return;
  }

  if (isDrawing && currentStroke) {
    currentStroke.points.push({ x: w.x, y: w.y });
    redraw();
  }
});

canvas.addEventListener('mouseup', e => {
  if (isPanning) {
    isPanning = false;
    updateCursor();
    return;
  }
  if (isDrawing && currentStroke) {
    isDrawing = false;
    history.push(currentStroke);
    currentStroke = null;
    redraw();
  }
});

canvas.addEventListener('mouseleave', () => {
  if (isDrawing && currentStroke) {
    history.push(currentStroke);
    currentStroke = null;
    isDrawing = false;
    redraw();
  }
});

// 滚轮缩放
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
  const newScale = Math.max(0.1, Math.min(50, scale * zoomFactor));

  // 以鼠标位置为中心缩放
  offsetX = e.clientX - (e.clientX - offsetX) * (newScale / scale);
  offsetY = e.clientY - (e.clientY - offsetY) * (newScale / scale);
  scale = newScale;

  updateZoomLabel();
  redraw();
}, { passive: false });

// ============ 触摸事件 ============
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches;

  if (t.length === 1) {
    const touch = t[0];
    if (tool === 'pan') {
      isPanning = true;
      lastX = touch.clientX;
      lastY = touch.clientY;
    } else {
      isDrawing = true;
      const w = screenToWorld(touch.clientX, touch.clientY);
      currentStroke = {
        tool,
        color,
        lineWidth: tool === 'eraser' ? lineWidth * 3 : lineWidth,
        points: [{ x: w.x, y: w.y }]
      };
    }
  } else if (t.length === 2) {
    isDrawing = false;
    if (currentStroke) {
      history.push(currentStroke);
      currentStroke = null;
    }
    isPanning = true;
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    lastPinchDist = Math.hypot(dx, dy);
    lastPinchCenter = {
      x: (t[0].clientX + t[1].clientX) / 2,
      y: (t[0].clientY + t[1].clientY) / 2
    };
    lastX = lastPinchCenter.x;
    lastY = lastPinchCenter.y;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches;

  if (t.length === 1) {
    const touch = t[0];
    if (isPanning) {
      offsetX += touch.clientX - lastX;
      offsetY += touch.clientY - lastY;
      lastX = touch.clientX;
      lastY = touch.clientY;
      redraw();
    } else if (isDrawing && currentStroke) {
      const w = screenToWorld(touch.clientX, touch.clientY);
      currentStroke.points.push({ x: w.x, y: w.y });
      redraw();
    }
  } else if (t.length === 2) {
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    const dist = Math.hypot(dx, dy);
    const center = {
      x: (t[0].clientX + t[1].clientX) / 2,
      y: (t[0].clientY + t[1].clientY) / 2
    };

    if (lastPinchDist > 0) {
      const zoomFactor = dist / lastPinchDist;
      const newScale = Math.max(0.1, Math.min(50, scale * zoomFactor));
      offsetX = center.x - (center.x - offsetX) * (newScale / scale);
      offsetY = center.y - (center.y - offsetY) * (newScale / scale);
      scale = newScale;

      // 拖拽
      offsetX += center.x - lastX;
      offsetY += center.y - lastY;

      updateZoomLabel();
      redraw();
    }

    lastPinchDist = dist;
    lastX = center.x;
    lastY = center.y;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0) {
    if (isDrawing && currentStroke) {
      history.push(currentStroke);
      currentStroke = null;
    }
    isDrawing = false;
    isPanning = false;
    lastPinchDist = 0;
    lastPinchCenter = null;
    redraw();
  }
}, { passive: false });

// ============ 键盘 ============
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !spaceHeld) {
    spaceHeld = true;
    canvas.style.cursor = 'grab';
  }
  if (e.key === 'b' || e.key === 'B') setTool('pen');
  if (e.key === 'e' || e.key === 'E') setTool('eraser');
  if (e.key === 'h' || e.key === 'H' || e.key === ' ') setTool('pan');

  // Ctrl+Z 撤销
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    undo();
  }
});

document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    spaceHeld = false;
    updateCursor();
  }
});

// ============ 工具栏逻辑 ============
function setTool(t) {
  tool = t;
  document.getElementById('penBtn').classList.toggle('active', t === 'pen');
  document.getElementById('eraserBtn').classList.toggle('active', t === 'eraser');
  document.getElementById('panBtn').classList.toggle('active', t === 'pan');
  updateCursor();
}

function updateCursor() {
  if (tool === 'pan' || spaceHeld) {
    canvas.style.cursor = 'grab';
  } else if (tool === 'eraser') {
    canvas.style.cursor = 'cell';
  } else {
    canvas.style.cursor = 'crosshair';
  }
}

document.getElementById('penBtn').addEventListener('click', () => setTool('pen'));
document.getElementById('eraserBtn').addEventListener('click', () => setTool('eraser'));
document.getElementById('panBtn').addEventListener('click', () => setTool('pan'));

// 颜色
document.querySelectorAll('.color-btn[data-color]').forEach(btn => {
  btn.addEventListener('click', () => {
    color = btn.dataset.color;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// 自定义颜色
const colorPicker = document.getElementById('colorPicker');
document.getElementById('customColorBtn').addEventListener('click', () => colorPicker.click());
colorPicker.addEventListener('input', e => {
  color = e.target.value;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('customColorBtn').classList.add('active');
});

// 线宽
const sizeSlider = document.getElementById('sizeSlider');
const sizeLabel = document.getElementById('sizeLabel');
sizeSlider.addEventListener('input', () => {
  lineWidth = parseInt(sizeSlider.value);
  sizeLabel.textContent = lineWidth;
});

// 撤销
function undo() {
  if (history.length > 0) {
    history.pop();
    redraw();
  }
}
document.getElementById('undoBtn').addEventListener('click', undo);

// 清空
document.getElementById('clearBtn').addEventListener('click', () => {
  if (history.length === 0 || confirm('确定清空画布？')) {
    history = [];
    currentStroke = null;
    redraw();
  }
});

// 缩放
function updateZoomLabel() {
  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
}

document.getElementById('zoomIn').addEventListener('click', () => {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const ns = Math.min(50, scale * 1.2);
  offsetX = cx - (cx - offsetX) * (ns / scale);
  offsetY = cy - (cy - offsetY) * (ns / scale);
  scale = ns;
  updateZoomLabel();
  redraw();
});

document.getElementById('zoomOut').addEventListener('click', () => {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const ns = Math.max(0.1, scale / 1.2);
  offsetX = cx - (cx - offsetX) * (ns / scale);
  offsetY = cy - (cy - offsetY) * (ns / scale);
  scale = ns;
  updateZoomLabel();
  redraw();
});

document.getElementById('zoomLabel').addEventListener('click', () => {
  scale = 1; offsetX = 0; offsetY = 0;
  updateZoomLabel();
  redraw();
});

// ============ 提示淡出 ============
setTimeout(() => {
  document.getElementById('hint').style.opacity = '0';
}, 4000);

// ============ 初始化 ============
resize();
updateCursor();
</script>
</body>
</html>

<style>
/* ===== MD3 Color Tokens ===== */
:root {
  --md-sys-color-primary: #6750a4;
  --md-sys-color-on-primary: #fff;
  --md-sys-color-primary-container: #eaddff;
  --md-sys-color-on-primary-container: #21005d;
  --md-sys-color-surface: #fef7ff;
  --md-sys-color-on-surface: #1d1b20;
  --md-sys-color-on-surface-variant: #49454f;
  --md-sys-color-surface-container: #ece6f0;
  --md-sys-color-surface-container-high: #e6e0e9;
  --md-sys-color-surface-container-highest: #e0dae4;
  --md-sys-color-outline: #79747e;
  --md-sys-color-outline-variant: #cac4d0;
  --md-sys-color-inverse-surface: #322f35;
  --md-sys-color-inverse-on-surface: #f5eff7;
  --md-sys-shape-corner-small: 8px;
  --md-sys-shape-corner-medium: 12px;
  --md-sys-shape-corner-large: 16px;
  --md-sys-shape-corner-full: 9999px;
}

/* ===== Base ===== */
body { overflow: hidden; font-family: 'Roboto', sans-serif; background: var(--md-sys-color-surface); touch-action: none; user-select: none; margin: 0; }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }
#bgC { z-index: 0; } #drC { z-index: 1; }

/* ===== Material Symbols ===== */
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  font-size: 22px; user-select: none; pointer-events: none;
}

/* ===== md-icon-button sizing ===== */
.toolbar md-icon-button {
  width: 40px; height: 40px;
  transition: none;
}
.toolbar md-icon-button.active {
  background: var(--md-sys-color-primary-container);
  border-radius: var(--md-sys-shape-corner-full);
  transition: none;
}
.zoom-bar md-icon-button { --md-icon-button-icon-size: 20px; width: 32px; height: 32px; }
md-icon { font-family: 'Material Symbols Outlined'; }

/* ===== Toolbar ===== */
.toolbar {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  width: fit-content; display: flex; align-items: center;
  background: var(--md-sys-color-surface-container);
  padding: 4px 6px; border-radius: var(--md-sys-shape-corner-full);
  box-shadow: 0 1px 3px 1px rgba(0,0,0,.15), 0 1px 2px rgba(0,0,0,.3);
  z-index: 100; visibility: hidden; transition: box-shadow .2s ease;
}
.toolbar .sep { width: 1px; height: 24px; background: var(--md-sys-color-outline-variant); margin: 0 2px; flex-shrink: 0; opacity: .4; }
.toolbar.pressed { box-shadow: 0 3px 8px 2px rgba(0,0,0,.16), 0 1px 3px rgba(0,0,0,.22); cursor: grabbing; }
.toolbar .handle { width: 20px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: grab; touch-action: none; border-radius: var(--md-sys-shape-corner-small); }
.toolbar .handle .material-symbols-outlined { font-size: 14px; color: var(--md-sys-color-outline); opacity: .5; }

/* ===== Pen color indicator ===== */
.pen-wrap { position: relative; display: flex; }
.pen-wrap::after {
  content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
  width: 14px; height: 3px; border-radius: 2px;
  background: var(--pen-col, #1f1f1f); z-index: 2; transition: background .2s;
}

/* ===== Menu ===== */
.menu-overlay { position: fixed; inset: 0; z-index: 199; display: none; pointer-events: none; }
.menu-overlay.open { display: block; pointer-events: auto; }
.color-menu {
  position: fixed; z-index: 200; display: none;
  background: var(--md-sys-color-surface-container);
  border-radius: var(--md-sys-shape-corner-large);
  box-shadow: 0 4px 8px 3px rgba(0,0,0,.15), 0 1px 3px rgba(0,0,0,.3);
  overflow: hidden; transform-origin: bottom center; padding: 8px 0;
}
.color-menu.open { display: block; animation: menu-in .2s cubic-bezier(.2,0,0,1); }
.color-menu.closing { display: block; animation: menu-out .15s cubic-bezier(.4,0,1,1) forwards; }
@keyframes menu-in { from { opacity: 0; transform: scale(.92) translateY(8px); } to { opacity: 1; } }
@keyframes menu-out { from { opacity: 1; } to { opacity: 0; transform: scale(.92) translateY(8px); } }
.menu-title { font-size: 11px; font-weight: 500; letter-spacing: .5px; color: var(--md-sys-color-on-surface-variant); padding: 12px 16px 6px; text-transform: uppercase; }
.color-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 6px 16px 10px; }
.color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: transform .15s, border-color .15s, box-shadow .15s; justify-self: center; }
.color-dot:hover { transform: scale(1.2); box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.color-dot:active { transform: scale(.9); }
.color-dot.active { border-color: var(--md-sys-color-primary); transform: scale(1.1); box-shadow: 0 0 0 3px var(--md-sys-color-primary-container); }
.color-dot.white { box-shadow: inset 0 0 0 1.5px var(--md-sys-color-outline-variant); }
.custom-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-top: 1px solid var(--md-sys-color-outline-variant); }
.custom-row input[type="color"] { width: 28px; height: 28px; border: none; border-radius: 50%; cursor: pointer; padding: 0; background: none; -webkit-appearance: none; }
.custom-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
.custom-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
.custom-row label { font-size: 13px; color: var(--md-sys-color-on-surface-variant); }
.custom-row .hex { font-size: 11px; color: var(--md-sys-color-outline); font-family: 'Roboto Mono', monospace; margin-left: auto; }
.size-row { display: flex; align-items: center; gap: 12px; padding: 8px 16px 14px; border-top: 1px solid var(--md-sys-color-outline-variant); }
.size-row md-slider { flex: 1; }
.size-preview { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.size-dot { border-radius: 50%; background: var(--md-sys-color-on-surface); transition: width .1s, height .1s; }
.size-val { font-size: 14px; min-width: 28px; text-align: center; font-weight: 500; color: var(--md-sys-color-on-surface); }

/* ===== Zoom bar ===== */
.zoom-bar { position: fixed; bottom: 16px; right: 16px; display: flex; align-items: center; background: var(--md-sys-color-surface-container); padding: 2px 6px; border-radius: var(--md-sys-shape-corner-full); box-shadow: 0 1px 3px 1px rgba(0,0,0,.15), 0 1px 2px rgba(0,0,0,.3); z-index: 100; visibility: hidden; }
.zoom-label { font-size: 12px; color: var(--md-sys-color-on-surface-variant); min-width: 48px; text-align: center; cursor: pointer; font-weight: 500; padding: 4px 0; border-radius: var(--md-sys-shape-corner-small); }
.zoom-label:hover { background: rgba(0,0,0,.06); }
[data-theme="dark"] .zoom-label:hover { background: rgba(255,255,255,.06); }

/* ===== Coordinates ===== */
.coords { position: fixed; bottom: 16px; left: 16px; font-size: 11px; color: var(--md-sys-color-on-surface-variant); z-index: 100; font-variant-numeric: tabular-nums; background: var(--md-sys-color-surface-container); padding: 4px 12px; border-radius: var(--md-sys-shape-corner-full); font-family: 'Roboto Mono', monospace; visibility: hidden; box-shadow: 0 1px 3px 1px rgba(0,0,0,.15), 0 1px 2px rgba(0,0,0,.3); }

/* ===== Toast ===== */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--md-sys-color-inverse-surface); color: var(--md-sys-color-inverse-on-surface); padding: 12px 24px; border-radius: var(--md-sys-shape-corner-small); font-size: 14px; z-index: 999; opacity: 0; transition: all .25s cubic-bezier(.2,0,0,1); pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== Hint ===== */
.hint { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--md-sys-color-on-surface-variant); background: var(--md-sys-color-surface-container); padding: 6px 20px; border-radius: var(--md-sys-shape-corner-full); box-shadow: 0 1px 3px 1px rgba(0,0,0,.15), 0 1px 2px rgba(0,0,0,.3); z-index: 100; pointer-events: none; transition: opacity 1s; display: flex; align-items: center; gap: 8px; }
.hint .material-symbols-outlined { font-size: 16px; }

/* ===== Eraser cursor ===== */
.eraser-cursor { position: fixed; border-radius: 50%; border: 2px solid var(--md-sys-color-primary); pointer-events: none; z-index: 50; display: none; transform: translate(-50%,-50%); background: rgba(11,87,208,.08); }
[data-theme="dark"] .eraser-cursor { background: rgba(168,199,250,.1); }
#fi { display: none; }

/* ===== Settings ===== */
.settings-overlay { position: fixed; inset: 0; z-index: 299; display: none; }
.settings-overlay.open { display: block; }
.settings-panel {
  position: fixed; z-index: 300;
  display: none; min-width: 280px;
  background: var(--md-sys-color-surface-container);
  border-radius: var(--md-sys-shape-corner-large);
  box-shadow: 0 4px 8px 3px rgba(0,0,0,.15), 0 1px 3px rgba(0,0,0,.3);
  overflow: hidden; animation: panel-in .2s cubic-bezier(.2,0,0,1);
}
.settings-panel.open { display: block; }
@keyframes panel-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.settings-title { font-size: 14px; font-weight: 500; color: var(--md-sys-color-on-surface); padding: 16px 16px 8px; }
.settings-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; transition: background .15s; position: relative; overflow: hidden; }
.settings-item:hover { background: color-mix(in srgb, var(--md-sys-color-on-surface) 8%, transparent); }
.settings-item-label { font-size: 14px; color: var(--md-sys-color-on-surface); }
.settings-item-desc { font-size: 12px; color: var(--md-sys-color-on-surface-variant); margin-top: 2px; }
.color-indicator { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--md-sys-color-outline-variant); cursor: pointer; transition: transform .15s; }
.color-indicator:hover { transform: scale(1.15); }

#themeColorInput { position: fixed; width: 0; height: 0; padding: 0; border: none; opacity: 0; }

/* ===== Changelog ===== */
.cl-version + .cl-version { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--md-sys-color-outline-variant); }
.cl-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.cl-tag { font-size: 13px; font-weight: 500; color: var(--md-sys-color-on-primary-container); background: var(--md-sys-color-primary-container); padding: 2px 10px; border-radius: var(--md-sys-shape-corner-full); }
.cl-date { font-size: 12px; color: var(--md-sys-color-on-surface-variant); }
.cl-list { margin: 0; padding-left: 20px; }
.cl-list li { font-size: 13px; color: var(--md-sys-color-on-surface); line-height: 1.8; }
#dlgChangelog [slot="content"] { max-height: 50vh; overflow-y: auto; min-width: 280px; }

</style>

<script>
'use strict';
const $ = id => document.getElementById(id);

/* ===== DOM ===== */
const bgC = $('bgC'), drC = $('drC');
const bgX = bgC.getContext('2d'), drX = drC.getContext('2d');
const tb = $('tb'), ec = $('ec'), menu = $('menu'), penWrap = $('penWrap');

/* ===== State ===== */
let tool = 'pen', col = '#1f1f1f', lw = 3;
const ERASER_R = 3; // fixed eraser radius in world coords
let bg = '#f0f0f0', bgm = 'light', sc = 1, ox = 0, oy = 0;
let hist = [], redoStk = [], cur = null;
let drawing = false, panning = false, spaceH = false, erasing = false;
let mx0 = 0, my0 = 0, eraserX = 0, eraserY = 0;
const CURSORS = { pen: 'crosshair', eraser: 'none', pan: 'grab' };
function updateCursor() { drC.style.cursor = panning ? 'grabbing' : (CURSORS[tool] || 'crosshair'); }
function s2w(sx, sy) { return { x: (sx - ox) / sc, y: (sy - oy) / sc }; }

/* ===== Resize ===== */
function resize() { bgC.width = innerWidth; bgC.height = innerHeight; drC.width = innerWidth; drC.height = innerHeight; drawBg(); drawAll(); }
addEventListener('resize', resize);

/* ===== Background ===== */
function drawBg() {
  const c = bgX; c.setTransform(1,0,0,1,0,0); c.clearRect(0,0,bgC.width,bgC.height);
  c.fillStyle = bg; c.fillRect(0,0,bgC.width,bgC.height);
  const g=40; c.strokeStyle = bgm==='dark'?'rgba(255,255,255,.05)':'rgba(0,0,0,.05)'; c.lineWidth=.5;
  const sx=ox%(g*sc),sy=oy%(g*sc),st=g*sc;
  c.beginPath();
  for(let x=sx;x<bgC.width;x+=st){c.moveTo(x,0);c.lineTo(x,bgC.height)}
  for(let y=sy;y<bgC.height;y+=st){c.moveTo(0,y);c.lineTo(bgC.width,y)}
  c.stroke();
}

/* ===== Draw ===== */
function drawAll(){const c=drX;c.setTransform(1,0,0,1,0,0);c.clearRect(0,0,drC.width,drC.height);c.setTransform(sc,0,0,sc,ox,oy);for(const s of hist)drawS(c,s);if(cur)drawS(c,cur)}
function drawS(c,s){if(!s.pts||!s.pts.length)return;c.save();c.lineCap='round';c.lineJoin='round';c.lineWidth=s.lw;if(s.era){c.globalCompositeOperation='destination-out';c.strokeStyle='rgba(0,0,0,1)';c.fillStyle='rgba(0,0,0,1)'}else{c.globalCompositeOperation='source-over';c.strokeStyle=s.col;c.fillStyle=s.col}const p=s.pts;if(p.length===1){c.beginPath();c.arc(p[0].x,p[0].y,s.lw/2,0,Math.PI*2);c.fill()}else{c.beginPath();c.moveTo(p[0].x,p[0].y);for(let i=1;i<p.length-1;i++)c.quadraticCurveTo(p[i].x,p[i].y,(p[i].x+p[i+1].x)/2,(p[i].y+p[i+1].y)/2);c.lineTo(p[p.length-1].x,p[p.length-1].y);c.stroke()}c.restore()}

/* ===== Erase ===== */
function eraseAt(wx,wy){const r=Math.max(ERASER_R*2,16),r2=r*r;let ch=false;for(let i=hist.length-1;i>=0;i--){if(hist[i].era)continue;for(const p of hist[i].pts){if((p.x-wx)**2+(p.y-wy)**2<r2){hist.splice(i,1);ch=true;break}}}if(ch){redoStk.length=0;drawAll()}}
function eraseAlong(fx,fy,tx,ty){const dx=tx-fx,dy=ty-fy,dist=Math.hypot(dx,dy),step=Math.max(Math.max(ERASER_R*2,16)/2,4),steps=Math.max(1,Math.ceil(dist/step));for(let i=0;i<=steps;i++){const t=i/steps;eraseAt(fx+dx*t,fy+dy*t)}}
function eraseAtRadius(pts,r){const rW=r/sc,r2=rW*rW;let ch=false;for(let i=hist.length-1;i>=0;i--){if(hist[i].era)continue;for(const sp of hist[i].pts){for(const ep of pts){if((sp.x-ep.x)**2+(sp.y-ep.y)**2<r2){hist.splice(i,1);ch=true;break}}if(ch)break}if(ch){redoStk.length=0;drawAll();ch=false}}}

/* ===== Menu ===== */
const menuOverlay=$('menuOverlay');
function openMenu(){
  menu.classList.add('open');
  menuOverlay.classList.add('open');
  const r=penWrap.getBoundingClientRect();
  const mw=menu.offsetWidth, mh=menu.offsetHeight;
  let left=r.left+r.width/2-mw/2;
  let top=r.top-mh-12;
  if(top<8) top=r.bottom+12;
  if(top+mh>innerHeight-8) top=innerHeight-mh-8;
  left=Math.max(8,Math.min(left,innerWidth-mw-8));
  menu.style.left=left+'px';
  menu.style.top=top+'px';
}
function closeMenu(){menu.classList.remove('open');menu.classList.add('closing');menuOverlay.classList.remove('open');menu.addEventListener('animationend',()=>menu.classList.remove('closing'),{once:true})}
function menuIsOpen(){return menu.classList.contains('open')}
/* close menu when clicking/tapping outside */
function closeMenuAndForward(e){
  if(!menuIsOpen()) return;
  if(e.target.closest('.color-menu')||e.target.closest('.toolbar')) return;
  closeMenu();
  const sx=e.clientX, sy=e.clientY;
  const isMouse=e.pointerType==='mouse';
  menuOverlay.style.pointerEvents='none';
  if(isMouse){
    drC.dispatchEvent(new MouseEvent('mousedown',{clientX:sx,clientY:sy,button:0,bubbles:true}));
  }else{
    if(tool==='pan'||spaceH){tState='pan';panning=true;mx0=sx;my0=sy;updateCursor()}

      el.style.background=isDark?'var(--md-sys-color-on-primary-container)':'var(--md-sys-color-primary-container)';

}

drC.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches;if(tState==='3e'){if(t.length>=3){const c=t3c(t),r=t3r(t,c);showEC(c.sx,c.sy,r);const pts=[c];if(t3prev){for(let f=.33;f<1;f+=.33)pts.push({x:t3prev.x+(c.x-t3prev.x)*f,y:t3prev.y+(c.y-t3prev.y)*f})}eraseAtRadius(pts,r);t3prev=c}else{tState='none';hideEC()}return}if(tState==='pan'&&t.length===2){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;const dist=Math.hypot(dx,dy),cx=(t[0].clientX+t[1].clientX)/2,cy=(t[0].clientY+t[1].clientY)/2;if(pDist>0){const ns=Math.max(.05,Math.min(100,sc*(dist/pDist)));ox=cx-(cx-ox)*(ns/sc);oy=cy-(cy-oy)*(ns/sc);sc=ns;ox+=cx-mx0;oy+=cy-my0;$('zl').textContent=Math.round(sc*100)+'%';drawBg();drawAll()}pDist=dist;mx0=cx;my0=cy;return}if(tState==='pan'&&t.length===1&&panning){const tt=t[0];ox+=tt.clientX-mx0;oy+=tt.clientY-my0;mx0=tt.clientX;my0=tt.clientY;drawBg();drawAll();return}if(tState==='erase'&&t.length===1&&erasing){const w=s2w(t[0].clientX,t[0].clientY);eraseAlong(eraserX,eraserY,w.x,w.y);eraserX=w.x;eraserY=w.y}if(tState==='draw'&&t.length===1&&drawing&&cur){const w=s2w(t[0].clientX,t[0].clientY);cur.pts.push({x:w.x,y:w.y});drawAll()}}, {passive:false});
drC.addEventListener('touchend',e=>{e.preventDefault();if(e.touches.length===0){if(drawing&&cur){drawing=false;if(cur.pts.length>=1){redoStk.length=0;hist.push(cur)}cur=null;drawAll()}erasing=false;panning=false;tState='none';t3prev=null;hideEC()}else if(e.touches.length<3&&tState==='3e'){tState='none';t3prev=null;hideEC()}}, {passive:false});
function t3c(ts){let cx=0,cy=0;for(let i=0;i<3;i++){cx+=ts[i].clientX;cy+=ts[i].clientY}cx/=3;cy/=3;const w=s2w(cx,cy);return{sx:cx,sy:cy,x:w.x,y:w.y}}
function t3r(ts,c){let mx=0;for(let i=0;i<3;i++){const d=Math.hypot(ts[i].clientX-c.sx,ts[i].clientY-c.sy);if(d>mx)mx=d}return Math.max(mx+25,40)}

const settingsPanel=$('settingsPanel'),settingsOverlay=$('settingsOverlay');

let themeColor='#6750A4',isDark=window.matchMedia('(prefers-color-scheme:dark)').matches,followSystem=true;


function applyThemeColor(hex){
  themeColor=hex;
  themeColorCircle.style.background=hex;
  themeColorInput.value=hex;
  const root=document.documentElement;
  const set=(k,v)=>root.style.setProperty(k,v);
  const mcu=window._mcu;
  if(!mcu)return;
  const theme=mcu.themeFromSourceColor(mcu.argbFromHex(hex));
  const s=isDark?theme.schemes.dark:theme.schemes.light;
  const toJSON=o=>(typeof o.toJSON==='function'?o.toJSON():o);
  const sc=toJSON(s);
  const hexC=v=>mcu.hexFromArgb(v);
  /* surfaceContainer* may be #000000 in older lib — derive from neutral palette */
  const neut=theme.palettes.neutral;
  const nTone=t=>hexC(neut.tone(t));
  const surfLowest=isDark?nTone(6):nTone(88);
  const surfLow=isDark?nTone(10):nTone(90);
  const surfCont=isDark?nTone(12):nTone(92);
  const surfHigh=isDark?nTone(17):nTone(94);
  const surfHighest=isDark?nTone(22):nTone(96);
  set('--md-sys-color-primary',hexC(sc.primary));
  set('--md-sys-color-on-primary',hexC(sc.onPrimary));
  set('--md-sys-color-primary-container',hexC(sc.primaryContainer));
  set('--md-sys-color-on-primary-container',hexC(sc.onPrimaryContainer));
  set('--md-sys-color-secondary',hexC(sc.secondary));
  set('--md-sys-color-on-secondary',hexC(sc.onSecondary));
  set('--md-sys-color-secondary-container',hexC(sc.secondaryContainer));
  set('--md-sys-color-on-secondary-container',hexC(sc.onSecondaryContainer));
  set('--md-sys-color-tertiary',hexC(sc.tertiary));
  set('--md-sys-color-on-tertiary',hexC(sc.onTertiary));
  set('--md-sys-color-tertiary-container',hexC(sc.tertiaryContainer));
  set('--md-sys-color-on-tertiary-container',hexC(sc.onTertiaryContainer));
  set('--md-sys-color-error',hexC(sc.error));
  set('--md-sys-color-on-error',hexC(sc.onError));
  set('--md-sys-color-error-container',hexC(sc.errorContainer));
  set('--md-sys-color-on-error-container',hexC(sc.onErrorContainer));
  set('--md-sys-color-surface',hexC(sc.surface));
  set('--md-sys-color-on-surface',hexC(sc.onSurface));
  set('--md-sys-color-on-surface-variant',hexC(sc.onSurfaceVariant));
  set('--md-sys-color-surface-container',surfCont);
  set('--md-sys-color-surface-container-low',surfLow);
  set('--md-sys-color-surface-container-high',surfHigh);
  set('--md-sys-color-surface-container-highest',surfHighest);
  set('--md-sys-color-surface-container-lowest',surfLowest);
  set('--md-sys-color-outline',hexC(sc.outline));
  set('--md-sys-color-outline-variant',hexC(sc.outlineVariant));
  set('--md-sys-color-inverse-surface',hexC(sc.inverseSurface));
  set('--md-sys-color-inverse-on-surface',hexC(sc.inverseOnSurface));
  set('--md-sys-color-inverse-primary',hexC(sc.inversePrimary));
  /* clear inline overrides so CSS vars take effect */
  document.querySelectorAll('.toolbar,.zoom-bar,.coords,.settings-panel,.color-menu').forEach(el=>el.style.background='');
  bg=hexC(sc.surface);
  if(col==='#0b57d0'||col==='#a8c7fa'||col==='#6750a4'){col=hex;updColUI()}
}

  document.querySelector('.zoom-bar').style.visibility='visible';
  $('cd').style.visibility='visible';
  themeColorCircle.style.background=themeColor;
  themeColorInput.value=themeColor;
  applyDarkMode();
}
if(window._mcu){initAndShow()}
else{window.addEventListener('mcu-ready',()=>initAndShow(),{once:true})}

/* ===== Init ===== */
setTimeout(()=>{const h=$('hb');if(h){h.style.opacity='0';setTimeout(()=>h.remove(),1200)}},5000);
resize();updateCursor();setTool('pen');
</script>
</body>
</html>
